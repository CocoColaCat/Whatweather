<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; }

    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .weather-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #2d6a8f 70%, #0f172a 100%);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float { animation: float 4s ease-in-out infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.2s; }
    .fade-up-3 { animation-delay: 0.3s; }
    .fade-up-4 { animation-delay: 0.4s; }
    .fade-up-5 { animation-delay: 0.5s; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full weather-bg text-white overflow-auto"><!-- Loading -->
   <div id="loading-screen" class="flex flex-col items-center justify-center h-full gap-8 px-6">
    <div class="text-center">
     <div class="text-6xl font-bold mb-4">
      <span style="color: #0ea5e9;">W</span><span class="text-white">hatweather</span>
     </div>
     <p class="text-sky-300 text-sm tracking-wide">天氣智能助手</p>
    </div>
    <div class="spinner"></div>
    <p class="text-sky-200 text-lg text-center">正在定位您的位置...</p>
    <div class="w-full max-w-xs">
     <div class="h-1 bg-sky-900 rounded-full overflow-hidden">
      <div class="h-full bg-gradient-to-r from-sky-500 to-sky-300 animate-pulse" style="width: 60%;"></div>
     </div>
    </div>
    <div class="flex gap-3 flex-col sm:flex-row">
     <button id="skip-btn" onclick="skipGeolocation()" class="px-6 py-2.5 rounded-full bg-sky-600 hover:bg-sky-500 transition font-medium text-sm">稍後提醒</button>
    </div>
   </div><!-- Error -->
   <div id="error-screen" class="hidden flex flex-col items-center justify-center h-full gap-4 px-6 text-center">
    <div class="text-6xl mb-2">
     📍
    </div>
    <p id="error-msg" class="text-sky-200 text-lg"></p>
    <div class="flex gap-3 flex-col sm:flex-row">
     <button id="retry-btn" onclick="initWeather()" class="mt-4 px-6 py-2.5 rounded-full bg-sky-500 hover:bg-sky-400 transition font-medium">重試</button> <button onclick="skipGeolocation()" class="mt-2 sm:mt-4 px-6 py-2.5 rounded-full bg-sky-600 hover:bg-sky-500 transition font-medium">稍後提醒</button>
    </div>
   </div><!-- Main -->
   <div id="main-screen" class="hidden max-w-2xl mx-auto px-4 py-8 sm:py-12"><!-- Header -->
    <div class="fade-up fade-up-1 text-center mb-8">
     <h1 id="site-title" class="text-sm tracking-widest uppercase text-sky-300 mb-1"><span style="color: #0ea5e9;">W</span><span>hatweather</span></h1>
     <div class="flex items-center justify-center gap-2 text-sky-100"><i data-lucide="map-pin" style="width:16px;height:16px;"></i> <span id="location-name" class="text-lg font-medium"></span>
     </div>
    </div><!-- Tabs -->
    <div class="fade-up fade-up-1 flex gap-2 mb-8 border-b border-sky-700">
     <button id="tab-weather" onclick="switchTab('weather')" class="tab-btn active px-4 py-3 text-sky-300 border-b-2 border-sky-400 font-medium transition">天氣</button> <button id="tab-ai" onclick="switchTab('ai')" class="tab-btn px-4 py-3 text-sky-500 hover:text-sky-300 transition">天氣AI</button>
    </div><!-- Weather Tab -->
    <div id="weather-tab" class="tab-content"><!-- Current Weather -->
     <div class="fade-up fade-up-2 glass rounded-3xl p-6 sm:p-8 text-center mb-6">
      <div class="float text-7xl sm:text-8xl mb-3" id="weather-icon">
       ☀️
      </div>
      <div class="text-7xl sm:text-8xl font-light tracking-tighter" id="current-temp">
       --°
      </div>
      <p class="text-sky-200 text-xl mt-1 capitalize" id="weather-desc">--</p>
      <div class="flex justify-center gap-6 mt-5 text-sm text-sky-300"><span id="feels-like" class="flex items-center gap-1"><i data-lucide="thermometer" style="width:14px;height:14px;"></i> 體感 --°</span> <span id="high-low" class="flex items-center gap-1"><i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i> --° / --°</span>
      </div>
     </div><!-- Details Grid -->
     <div class="fade-up fade-up-3 grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="droplets" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        濕度
       </div>
       <div id="humidity" class="text-lg font-semibold">
        --%
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="wind" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        風速
       </div>
       <div id="wind" class="text-lg font-semibold">
        -- m/s
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="eye" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        能見度
       </div>
       <div id="visibility" class="text-lg font-semibold">
        -- km
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="gauge" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        氣壓
       </div>
       <div id="pressure" class="text-lg font-semibold">
        -- hPa
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="sun" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        紫外線
       </div>
       <div id="uv-index" class="text-lg font-semibold">
        --
       </div>
      </div>
     </div><!-- Hourly Forecast -->
     <div class="fade-up fade-up-4 glass rounded-2xl p-4 mb-6">
      <h3 class="text-sky-300 text-sm font-medium mb-3 px-1">未來預報</h3>
      <div id="hourly" class="flex gap-3 overflow-x-auto hourly-scroll pb-2"></div>
     </div><!-- Rain/Sunny Card -->
     <div class="fade-up fade-up-5 glass rounded-2xl p-6 text-center mb-4">
      <div id="weather-condition-icon" class="text-6xl mb-3">
       ☀️
      </div>
      <div id="weather-condition-value" class="text-2xl font-semibold text-sky-200 mb-2">
       0 mm
      </div>
      <p id="weather-condition-text" class="text-sky-300 text-sm">今日晴空萬里適合外出走走</p>
     </div><!-- Updated time -->
     <p id="updated-time" class="text-center text-sky-500 text-xs mt-6"></p>
    </div><!-- AI Chat Tab -->
    <div id="ai-tab" class="tab-content hidden">
     <div class="glass rounded-2xl p-6 mb-6 h-96 flex flex-col">
      <h3 class="text-sky-300 font-medium mb-4 flex items-center gap-2"><i data-lucide="sparkles" style="width:18px;height:18px;"></i>天氣智能助手</h3>
      <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2">
       <div class="glass rounded-2xl p-3 max-w-xs bg-sky-900 bg-opacity-50">
        <p class="text-sky-200 text-sm">👋 你好！我是天氣助手，有什麼天氣問題我可以幫助你嗎？</p>
        <p class="text-sky-500 text-xs mt-1">現在</p>
       </div>
      </div>
      <div class="flex gap-2">
       <input id="ai-input" type="text" placeholder="詢問天氣..." class="flex-1 bg-sky-950 border border-sky-700 rounded-full px-4 py-2.5 text-sky-100 placeholder-sky-600 focus:outline-none focus:border-sky-500 transition"> <button onclick="sendAIMessage()" class="px-4 py-2.5 bg-sky-600 hover:bg-sky-500 rounded-full transition"><i data-lucide="send" style="width:18px;height:18px;"></i></button>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
  const defaultConfig = {
    site_title: 'Whatweather',
    sunny_message: '今日晴空萬里適合外出走走',
    rainy_message: '記得帶傘！',
    ai_placeholder: '詢問天氣...',
    background_color: '#0f172a',
    surface_color: '#1e3a5f',
    text_color: '#ffffff',
    primary_action_color: '#0ea5e9',
    secondary_action_color: '#7dd3fc'
  };

  const weatherEmoji = {
    '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️',
    '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
    '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
  };

  let currentWeatherData = null;

  function switchTab(tab) {
    document.getElementById('weather-tab').classList.toggle('hidden', tab !== 'weather');
    document.getElementById('ai-tab').classList.toggle('hidden', tab !== 'ai');
    document.getElementById('tab-weather').classList.toggle('active', tab === 'weather');
    document.getElementById('tab-ai').classList.toggle('active', tab === 'ai');
    
    // Update tab button styles
    const weatherBtn = document.getElementById('tab-weather');
    const aiBtn = document.getElementById('tab-ai');
    
    if (tab === 'weather') {
      weatherBtn.classList.add('text-sky-300', 'border-b-2', 'border-sky-400');
      weatherBtn.classList.remove('text-sky-500', 'hover:text-sky-300');
      aiBtn.classList.remove('text-sky-300', 'border-b-2', 'border-sky-400');
      aiBtn.classList.add('text-sky-500', 'hover:text-sky-300');
    } else {
      aiBtn.classList.add('text-sky-300', 'border-b-2', 'border-sky-400');
      aiBtn.classList.remove('text-sky-500');
      weatherBtn.classList.remove('text-sky-300', 'border-b-2', 'border-sky-400');
      weatherBtn.classList.add('text-sky-500');
    }
  }

  function sendAIMessage() {
    const input = document.getElementById('ai-input');
    const msg = input.value.trim();
    if (!msg) return;

    const messagesDiv = document.getElementById('chat-messages');
    
    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'flex justify-end';
    userMsg.innerHTML = `
      <div class="glass rounded-2xl p-3 max-w-xs bg-sky-600 bg-opacity-50">
        <p class="text-sky-100 text-sm">${msg}</p>
        <p class="text-sky-500 text-xs mt-1">現在</p>
      </div>
    `;
    messagesDiv.appendChild(userMsg);

    // AI response (simulated)
    setTimeout(() => {
      const aiMsg = document.createElement('div');
      aiMsg.className = 'glass rounded-2xl p-3 max-w-xs bg-sky-900 bg-opacity-50';
      const responses = [
        '根據目前的天氣資料，' + (currentWeatherData ? '當地氣溫約為 ' + Math.round(currentWeatherData.current.temperature_2m) + '°，' : '') + '建議您隨時關注天氣變化！',
        '好問題！我正在分析當地的氣象數據...',
        '根據預測，未來天氣將...',
        '讓我查一下最新的天氣資訊。'
      ];
      const response = responses[Math.floor(Math.random() * responses.length)];
      aiMsg.innerHTML = `
        <p class="text-sky-200 text-sm">${response}</p>
        <p class="text-sky-500 text-xs mt-1">${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}</p>
      `;
      messagesDiv.appendChild(aiMsg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 500);

    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  document.getElementById('ai-input')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendAIMessage();
  });

  function showScreen(id) {
    ['loading-screen','error-screen','main-screen'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
      if (s === id) document.getElementById(s).classList.remove('hidden');
    });
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    showScreen('error-screen');
  }

  async function fetchWeather(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,uv_index,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&hourly=temperature_2m,weather_code,precipitation&timezone=auto&forecast_days=2`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    return res.json();
  }

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=zh-TW`);
      const d = await res.json();
      const a = d.address;
      return a.city || a.town || a.county || a.state || d.display_name?.split(',')[0] || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    } catch {
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }
  }

  function wmoInfo(code, isNight) {
    const map = {
      0:['晴天', isNight?'🌙':'☀️'], 1:['大致晴朗','🌤️'], 2:['部分多雲','⛅'], 3:['陰天','☁️'],
      45:['霧','🌫️'], 48:['霧凇','🌫️'],
      51:['毛毛雨','🌦️'], 53:['毛毛雨','🌦️'], 55:['毛毛雨','🌧️'],
      61:['小雨','🌦️'], 63:['中雨','🌧️'], 65:['大雨','🌧️'],
      71:['小雪','❄️'], 73:['中雪','❄️'], 75:['大雪','❄️'],
      80:['陣雨','🌦️'], 81:['陣雨','🌧️'], 82:['強陣雨','🌧️'],
      85:['陣雪','❄️'], 86:['強陣雪','❄️'],
      95:['雷暴','⛈️'], 96:['雷暴夾冰雹','⛈️'], 99:['強雷暴','⛈️']
    };
    return map[code] || ['未知','❓'];
  }

  function renderWeather(data, locationName) {
    currentWeatherData = data;
    const c = data.current;
    const isNight = new Date().getHours() >= 18 || new Date().getHours() < 6;
    const [desc, emoji] = wmoInfo(c.weather_code, isNight);

    const isRaining = [51, 53, 55, 61, 63, 65, 80, 81, 82].includes(c.weather_code);
    const precipitation = c.precipitation || 0;
    const todayPrecipitation = data.daily.precipitation_sum[0] || 0;

    document.getElementById('location-name').textContent = locationName;
    document.getElementById('weather-icon').textContent = emoji;
    document.getElementById('current-temp').textContent = `${Math.round(c.temperature_2m)}°`;
    document.getElementById('weather-desc').textContent = desc;
    document.getElementById('feels-like').innerHTML = `<i data-lucide="thermometer" style="width:14px;height:14px;"></i> 體感 ${Math.round(c.apparent_temperature)}°`;
    document.getElementById('high-low').innerHTML = `<i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i> ${Math.round(data.daily.temperature_2m_max[0])}° / ${Math.round(data.daily.temperature_2m_min[0])}°`;
    document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('wind').textContent = `${c.wind_speed_10m} m/s`;
    document.getElementById('visibility').textContent = '--';
    document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
    document.getElementById('uv-index').textContent = `${Math.round(c.uv_index)}`;

    const now = new Date().getHours();
    const hourlyEl = document.getElementById('hourly');
    hourlyEl.innerHTML = '';
    for (let i = 0; i < 12; i++) {
      const idx = now + i;
      if (idx >= data.hourly.temperature_2m.length) break;
      const h = (now + i) % 24;
      const hn = h >= 18 || h < 6;
      const [, hEmoji] = wmoInfo(data.hourly.weather_code[idx], hn);
      hourlyEl.innerHTML += `
        <div class="flex-shrink-0 text-center px-3 py-2">
          <div class="text-xs text-sky-400 mb-1">${i===0?'現在':`${h}:00`}</div>
          <div class="text-2xl mb-1">${hEmoji}</div>
          <div class="text-sm font-medium">${Math.round(data.hourly.temperature_2m[idx])}°</div>
        </div>`;
    }

    const condIcon = document.getElementById('weather-condition-icon');
    const condValue = document.getElementById('weather-condition-value');
    const condText = document.getElementById('weather-condition-text');
    
    if (isRaining) {
      condIcon.textContent = '🌧️';
      condValue.textContent = `${todayPrecipitation.toFixed(1)} mm`;
      condText.textContent = window.elementSdk.config.rainy_message || defaultConfig.rainy_message;
    } else {
      condIcon.textContent = '☀️';
      condValue.textContent = '0 mm';
      condText.textContent = window.elementSdk.config.sunny_message || defaultConfig.sunny_message;
    }

    document.getElementById('updated-time').textContent = `更新於 ${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}`;
    showScreen('main-screen');
    lucide.createIcons();
  }

  async function initWeather() {
    showScreen('loading-screen');
    if (!navigator.geolocation) {
      showError('您的瀏覽器不支援定位功能');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude: lat, longitude: lon } = pos.coords;
          const [data, name] = await Promise.all([fetchWeather(lat, lon), reverseGeocode(lat, lon)]);
          renderWeather(data, name);
        } catch (e) {
          showError('無法取得天氣資料，請稍後再試');
        }
      },
      (err) => {
        if (err.code === 1) showError('請允許位置存取權限以查看天氣');
        else showError('無法取得您的位置，請稍後再試');
      },
      { timeout: 10000 }
    );
  }

  function skipGeolocation() {
    // 使用台北作為預設位置
    const defaultLat = 25.0330;
    const defaultLon = 121.5654;
    fetchWeather(defaultLat, defaultLon).then(data => {
      renderWeather(data, '台北');
    }).catch(err => {
      showError('無法取得天氣資料');
    });
  }

  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const t = document.getElementById('site-title');
      if (t) t.innerHTML = `<span style="color: #0ea5e9;">W</span><span>${config.site_title?.slice(1) || defaultConfig.site_title.slice(1)}</span>`;

      const font = config.font_family || 'Outfit';
      document.body.style.fontFamily = `${font}, 'Noto Sans TC', sans-serif`;

      const sz = config.font_size || 16;
      document.querySelectorAll('.text-7xl, .text-8xl').forEach(el => el.style.fontSize = `${sz * 4.5}px`);

      if (config.ai_placeholder) {
        const aiInput = document.getElementById('ai-input');
        if (aiInput) aiInput.placeholder = config.ai_placeholder;
      }
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
        { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); }},
        { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); }}
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || 'Outfit',
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || 16,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['site_title', config.site_title || defaultConfig.site_title],
      ['sunny_message', config.sunny_message || defaultConfig.sunny_message],
      ['rainy_message', config.rainy_message || defaultConfig.rainy_message],
