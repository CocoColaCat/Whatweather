<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; }

    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .weather-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #2d6a8f 70%, #0f172a 100%);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float { animation: float 4s ease-in-out infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.2s; }
    .fade-up-3 { animation-delay: 0.3s; }
    .fade-up-4 { animation-delay: 0.4s; }
    .fade-up-5 { animation-delay: 0.5s; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full weather-bg text-white overflow-auto"><!-- Loading Screen -->
   <div id="loading-screen" class="w-full h-full flex items-center justify-center">
    <div class="text-center">
     <div class="mb-6">
      <h1 class="text-5xl font-light tracking-wider mb-4"><span style="color: #0ea5e9;">W</span><span class="text-white">hatweather</span></h1>
     </div>
     <div class="spinner mx-auto mb-4"></div>
     <p class="text-sky-300">載入天氣資料中...</p>
    </div>
   </div><!-- Main -->
   <div id="main-screen" class="hidden max-w-2xl mx-auto px-4 py-8 sm:py-12"><!-- Header -->
    <div class="fade-up fade-up-1 text-center mb-8">
     <h1 id="site-title" class="text-sm tracking-widest uppercase text-sky-300 mb-1"><span style="color: #0ea5e9;">W</span><span>hatweather</span></h1>
     <div class="flex items-center justify-center gap-2 text-sky-100"><i data-lucide="map-pin" style="width:16px;height:16px;"></i> <span id="location-name" class="text-lg font-medium">台北</span> <button onclick="switchTab('settings')" class="text-sky-400 hover:text-sky-200 transition"><i data-lucide="edit-2" style="width:16px;height:16px;"></i></button>
     </div>
    </div><!-- Tabs -->
    <div class="fade-up fade-up-1 flex gap-2 mb-8 border-b border-sky-700">
     <button id="tab-weather" onclick="switchTab('weather')" class="tab-btn active px-4 py-3 text-sky-300 border-b-2 border-sky-400 font-medium transition flex items-center gap-2"><i data-lucide="cloud" style="width:16px;height:16px;"></i>天氣</button> <button id="tab-ai" onclick="switchTab('ai')" class="tab-btn px-4 py-3 text-sky-500 hover:text-sky-300 transition flex items-center gap-2"><i data-lucide="sparkles" style="width:16px;height:16px;"></i>天氣AI</button> <button id="tab-settings" onclick="switchTab('settings')" class="tab-btn px-4 py-3 text-sky-500 hover:text-sky-300 transition flex items-center gap-2"><i data-lucide="settings" style="width:16px;height:16px;"></i>設定</button>
    </div><!-- Weather Tab -->
    <div id="weather-tab" class="tab-content"><!-- Current Weather -->
     <div class="fade-up fade-up-2 glass rounded-3xl p-6 sm:p-8 text-center mb-6">
      <div class="float text-7xl sm:text-8xl mb-3" id="weather-icon">
       ☀️
      </div>
      <div class="text-7xl sm:text-8xl font-light tracking-tighter" id="current-temp">
       --°
      </div>
      <p class="text-sky-200 text-xl mt-1 capitalize" id="weather-desc">--</p>
      <div class="flex justify-center gap-6 mt-5 text-sm text-sky-300"><span id="feels-like" class="flex items-center gap-1"><i data-lucide="thermometer" style="width:14px;height:14px;"></i> 體感 --°</span> <span id="high-low" class="flex items-center gap-1"><i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i> --° / --°</span>
      </div>
     </div><!-- Details Grid -->
     <div class="fade-up fade-up-3 grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="droplets" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        濕度
       </div>
       <div id="humidity" class="text-lg font-semibold">
        --%
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="wind" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        風速
       </div>
       <div id="wind" class="text-lg font-semibold">
        -- m/s
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="eye" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        能見度
       </div>
       <div id="visibility" class="text-lg font-semibold">
        -- km
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="gauge" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        氣壓
       </div>
       <div id="pressure" class="text-lg font-semibold">
        -- hPa
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="sun" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        紫外線
       </div>
       <div id="uv-index" class="text-lg font-semibold">
        --
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="wind" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        空氣品質
       </div>
       <div id="air-quality" class="text-lg font-semibold">
        ---
       </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center"><i data-lucide="cloud-rain" style="width:20px;height:20px;" class="mx-auto text-sky-300 mb-1"></i>
       <div class="text-xs text-sky-400 mb-1">
        露點
       </div>
       <div id="dew-point" class="text-lg font-semibold">
        ---°
       </div>
      </div>
     </div><!-- 7-Day Forecast -->
     <div class="fade-up fade-up-4 glass rounded-2xl p-4 mb-6">
      <h3 class="text-sky-300 text-sm font-medium mb-3 px-1">7天預報</h3>
      <div id="daily-forecast" class="grid grid-cols-7 gap-2"></div>
     </div><!-- Hourly Forecast -->
     <div class="fade-up fade-up-4 glass rounded-2xl p-4 mb-6">
      <h3 class="text-sky-300 text-sm font-medium mb-3 px-1">未來24小時</h3>
      <div id="hourly" class="flex gap-3 overflow-x-auto hourly-scroll pb-2"></div>
     </div><!-- Weather Condition -->
     <div class="fade-up fade-up-5 glass rounded-2xl p-6 text-center mb-4">
      <div id="weather-condition-icon" class="text-6xl mb-3">
       ☀️
      </div>
      <div id="weather-condition-value" class="text-2xl font-semibold text-sky-200 mb-2">
       0 mm
      </div>
      <p id="weather-condition-text" class="text-sky-300 text-sm">今日晴空萬里適合外出走走</p>
     </div><!-- Clothing Suggestion -->
     <div class="fade-up fade-up-5 glass rounded-2xl p-6 mb-4">
      <div class="flex items-start justify-between mb-3">
       <div>
        <h3 class="text-sky-300 font-medium flex items-center gap-2 mb-2"><i data-lucide="shirt" style="width:18px;height:18px;"></i>適合搭配的衣物</h3>
        <p class="text-sky-300 text-sm">Whatweather AI幫您挑選今天適合的衣物</p>
       </div><button onclick="getClothingAdvice()" class="px-4 py-2 bg-sky-600 hover:bg-sky-500 rounded-lg text-sm font-medium transition">立即體驗</button>
      </div>
     </div><!-- Updated time -->
     <p id="updated-time" class="text-center text-sky-500 text-xs mt-6"></p>
    </div><!-- AI Chat Tab -->
    <div id="ai-tab" class="tab-content hidden">
     <div class="glass rounded-2xl p-6 mb-6 h-96 flex flex-col">
      <h3 class="text-sky-300 font-medium mb-4 flex items-center gap-2"><i data-lucide="sparkles" style="width:18px;height:18px;"></i>天氣智能助手</h3>
      <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2">
       <div class="glass rounded-2xl p-3 max-w-xs bg-sky-900 bg-opacity-50">
        <p class="text-sky-200 text-sm">👋 你好！我是天氣助手，有什麼天氣問題我可以幫助你嗎？</p>
        <p class="text-sky-500 text-xs mt-1">現在</p>
       </div>
      </div>
      <div class="flex gap-2">
       <input id="ai-input" type="text" placeholder="詢問天氣..." class="flex-1 bg-sky-950 border border-sky-700 rounded-full px-4 py-2.5 text-sky-100 placeholder-sky-600 focus:outline-none focus:border-sky-500 transition"> <button onclick="sendAIMessage()" class="px-4 py-2.5 bg-sky-600 hover:bg-sky-500 rounded-full transition"><i data-lucide="send" style="width:18px;height:18px;"></i></button>
      </div>
     </div>
    </div><!-- Settings Tab -->
    <div id="settings-tab" class="tab-content hidden">
     <div class="fade-up fade-up-2 glass rounded-2xl p-6 mb-6">
      <h3 class="text-sky-300 font-medium mb-4 flex items-center gap-2"><i data-lucide="map-pin" style="width:18px;height:18px;"></i>位置設定</h3>
      <div class="space-y-3">
       <div><label class="block text-sky-300 text-sm mb-2">輸入城市（英文）</label>
        <div class="flex gap-2"><input id="location-input" type="text" placeholder="例如: Taipei, Tokyo" class="flex-1 bg-sky-950 border border-sky-700 rounded-lg px-4 py-2 text-sky-100 placeholder-sky-600 focus:outline-none focus:border-sky-500 transition"> <button onclick="searchLocation()" class="px-4 py-2 bg-sky-600 hover:bg-sky-500 rounded-lg transition">搜尋</button>
        </div>
       </div>
       <div class="flex gap-2"><button onclick="useAutoLocation()" class="flex-1 px-4 py-2 bg-sky-700 hover:bg-sky-600 rounded-lg text-sm transition flex items-center justify-center gap-2"><i data-lucide="map" style="width:16px;height:16px;"></i>使用定位</button> <button onclick="resetToTaipei()" class="flex-1 px-4 py-2 bg-sky-500 hover:bg-sky-400 rounded-lg text-sm transition">回到台北</button>
       </div>
      </div>
     </div>
     <p id="settings-status" class="text-center text-sky-400 text-sm"></p>
    </div>
   </div>
  </div>
  <script>
  const defaultConfig = {
    site_title: 'Whatweather',
    sunny_message: '今日晴空萬里適合外出走走',
    rainy_message: '記得帶傘！',
    ai_placeholder: '詢問天氣...'
  };

  let currentWeatherData = null;
  let currentLocation = '台北';
  let currentLat = 25.0330;
  let currentLon = 121.5654;

  function switchTab(tab) {
    document.getElementById('weather-tab').classList.toggle('hidden', tab !== 'weather');
    document.getElementById('ai-tab').classList.toggle('hidden', tab !== 'ai');
    document.getElementById('settings-tab').classList.toggle('hidden', tab !== 'settings');
    
    const weatherBtn = document.getElementById('tab-weather');
    const aiBtn = document.getElementById('tab-ai');
    const settingsBtn = document.getElementById('tab-settings');
    
    [weatherBtn, aiBtn, settingsBtn].forEach(btn => {
      btn.classList.remove('text-sky-300', 'border-b-2', 'border-sky-400');
      btn.classList.add('text-sky-500');
    });
    
    const activeBtn = tab === 'weather' ? weatherBtn : tab === 'ai' ? aiBtn : settingsBtn;
    activeBtn.classList.add('text-sky-300', 'border-b-2', 'border-sky-400');
    activeBtn.classList.remove('text-sky-500');
  }

  function showLoadingScreen() {
    document.getElementById('loading-screen').classList.remove('hidden');
    document.getElementById('main-screen').classList.add('hidden');
  }

  function showMainScreen() {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
  }

  function searchLocation() {
    const input = document.getElementById('location-input');
    const location = input.value.trim();
    if (!location) return;

    document.getElementById('settings-status').textContent = '搜尋中...';
    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1&accept-language=zh-TW`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          document.getElementById('settings-status').textContent = '❌ 找不到該城市';
          return;
        }
        const { lat, lon, display_name } = data[0];
        currentLocation = location;
        currentLat = parseFloat(lat);
        currentLon = parseFloat(lon);
        document.getElementById('settings-status').textContent = '✓ 位置已更新';
        fetchWeatherData();
      })
      .catch(err => {
        document.getElementById('settings-status').textContent = '❌ 搜尋失敗';
      });
  }

  function useAutoLocation() {
    document.getElementById('settings-status').textContent = '定位中...';
    if (!navigator.geolocation) {
      document.getElementById('settings-status').textContent = '❌ 瀏覽器不支援定位';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLon = pos.coords.longitude;
        reverseGeocode(currentLat, currentLon).then(name => {
          currentLocation = name;
          document.getElementById('settings-status').textContent = '✓ 定位成功';
          fetchWeatherData();
        });
      },
      (err) => {
        document.getElementById('settings-status').textContent = '❌ 定位失敗';
      }
    );
  }

  function resetToTaipei() {
    currentLocation = '台北';
    currentLat = 25.0330;
    currentLon = 121.5654;
    document.getElementById('location-input').value = '';
    document.getElementById('settings-status').textContent = '✓ 已回到台北';
    fetchWeatherData();
  }

  function getClothingAdvice() {
    switchTab('ai');
    setTimeout(() => {
      const input = document.getElementById('ai-input');
      input.value = '請幫我挑選一個合適的衣服';
      sendAIMessage();
    }, 100);
  }

  function sendAIMessage() {
    const input = document.getElementById('ai-input');
    const msg = input.value.trim();
    if (!msg) return;

    const messagesDiv = document.getElementById('chat-messages');
    
    const userMsg = document.createElement('div');
    userMsg.className = 'flex justify-end';
    userMsg.innerHTML = `
      <div class="glass rounded-2xl p-3 max-w-xs bg-sky-600 bg-opacity-50">
        <p class="text-sky-100 text-sm">${msg}</p>
        <p class="text-sky-500 text-xs mt-1">${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}</p>
      </div>
    `;
    messagesDiv.appendChild(userMsg);

    setTimeout(() => {
      const aiMsg = document.createElement('div');
      aiMsg.className = 'glass rounded-2xl p-3 max-w-xs bg-sky-900 bg-opacity-50';
      
      let response = '根據目前的天氣資料';
      if (currentWeatherData) {
        const temp = Math.round(currentWeatherData.current.temperature_2m);
        const desc = currentWeatherData.current.weather_code;
        
        if (temp > 28) {
          response += `，氣溫約為 ${temp}°，建議穿著輕薄透氣的短袖T恤、短褲或裙子，搭配輕便的涼鞋。記得準備太陽眼鏡和防曬霜！☀️`;
        } else if (temp > 20) {
          response += `，氣溫約為 ${temp}°，適合穿著短袖或短褲加上薄外套。如需要也可以考慮牛仔褲搭配輕薄上衣。🌤️`;
        } else if (temp > 10) {
          response += `，氣溫約為 ${temp}°，建議穿著長袖上衣搭配牛仔褲或長褲，可以考慮加上風衣或毛衣。🧥`;
        } else {
          response += `，氣溫約為 ${temp}°，建議穿著厚重衣物，包括羽絨服、毛衣和長褲。記得戴圍巾和手套保暖！❄️`;
        }
        
        if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(desc)) {
          response += ' 預計會下雨，記得帶傘！🌂';
        }
      }
      
      aiMsg.innerHTML = `
        <p class="text-sky-200 text-sm">${response}</p>
        <p class="text-sky-500 text-xs mt-1">${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}</p>
      `;
      messagesDiv.appendChild(aiMsg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 500);

    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  document.getElementById('ai-input')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendAIMessage();
  });

  function calculateDewPoint(temp, humidity) {
    const a = 17.27;
    const b = 237.7;
    const alpha = ((a * temp) / (b + temp)) + Math.log(humidity / 100);
    const dewPoint = (b * alpha) / (a - alpha);
    return Math.round(dewPoint);
  }

  function getAirQualityLevel(pm25) {
    if (pm25 <= 12) return 'GOOD';
    if (pm25 <= 35.4) return 'MODERATE';
    if (pm25 <= 55.4) return 'UNHEALTHY FOR SENSITIVE GROUPS';
    if (pm25 <= 150.4) return 'UNHEALTHY';
    return 'VERY UNHEALTHY';
  }

  function wmoInfo(code, isNight) {
    const map = {
      0:['晴天', isNight?'🌙':'☀️'], 1:['大致晴朗','🌤️'], 2:['部分多雲','⛅'], 3:['陰天','☁️'],
      45:['霧','🌫️'], 48:['霧凇','🌫️'],
      51:['毛毛雨','🌦️'], 53:['毛毛雨','🌦️'], 55:['毛毛雨','🌧️'],
      61:['小雨','🌦️'], 63:['中雨','🌧️'], 65:['大雨','🌧️'],
      71:['小雪','❄️'], 73:['中雪','❄️'], 75:['大雪','❄️'],
      80:['陣雨','🌦️'], 81:['陣雨','🌧️'], 82:['強陣雨','🌧️'],
      85:['陣雪','❄️'], 86:['強陣雪','❄️'],
      95:['雷暴','⛈️'], 96:['雷暴夾冰雹','⛈️'], 99:['強雷暴','⛈️']
    };
    return map[code] || ['未知','❓'];
  }

  async function fetchWeather(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,uv_index,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code&hourly=temperature_2m,weather_code,precipitation&timezone=auto&forecast_days=8`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    return res.json();
  }

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=zh-TW`);
      const d = await res.json();
      const a = d.address;
      return a.city || a.town || a.county || a.state || d.display_name?.split(',')[0] || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    } catch {
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }
  }

  function renderWeather(data, locationName) {
    currentWeatherData = data;
    currentLocation = locationName;
    const c = data.current;
    const isNight = new Date().getHours() >= 18 || new Date().getHours() < 6;
    const [desc, emoji] = wmoInfo(c.weather_code, isNight);

    const isRaining = [51, 53, 55, 61, 63, 65, 80, 81, 82].includes(c.weather_code);
    const todayPrecipitation = data.daily.precipitation_sum[0] || 0;

    document.getElementById('location-name').textContent = locationName;
    document.getElementById('weather-icon').textContent = emoji;
    document.getElementById('current-temp').textContent = `${Math.round(c.temperature_2m)}°`;
    document.getElementById('weather-desc').textContent = desc;
    document.getElementById('feels-like').innerHTML = `<i data-lucide="thermometer" style="width:14px;height:14px;"></i> 體感 ${Math.round(c.apparent_temperature)}°`;
    document.getElementById('high-low').innerHTML = `<i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i> ${Math.round(data.daily.temperature_2m_max[0])}° / ${Math.round(data.daily.temperature_2m_min[0])}°`;
    document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('wind').textContent = `${c.wind_speed_10m} m/s`;
    document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
    document.getElementById('uv-index').textContent = c.uv_index !== null && c.uv_index !== undefined ? `${Math.round(c.uv_index)}` : '---';
    
    const dewPoint = c.temperature_2m && c.relative_humidity_2m ? calculateDewPoint(c.temperature_2m, c.relative_humidity_2m) : null;
    document.getElementById('dew-point').textContent = dewPoint !== null ? `${dewPoint}°` : '---°';
    
    const airQuality = getAirQualityLevel(35);
    const aqText = airQuality === 'GOOD' ? '優' : airQuality === 'MODERATE' ? '中' : '差';
    document.getElementById('air-quality').textContent = aqText;

    // Hourly forecast
    const now = new Date().getHours();
    const hourlyEl = document.getElementById('hourly');
    hourlyEl.innerHTML = '';
    for (let i = 0; i < 24; i++) {
      const idx = now + i;
      if (idx >= data.hourly.temperature_2m.length) break;
      const h = (now + i) % 24;
      const hn = h >= 18 || h < 6;
      const [, hEmoji] = wmoInfo(data.hourly.weather_code[idx], hn);
      hourlyEl.innerHTML += `
        <div class="flex-shrink-0 text-center px-3 py-2">
          <div class="text-xs text-sky-400 mb-1">${i===0?'現在':`${h}:00`}</div>
          <div class="text-2xl mb-1">${hEmoji}</div>
          <div class="text-sm font-medium">${Math.round(data.hourly.temperature_2m[idx])}°</div>
        </div>`;
    }

    // 7-day forecast
    const dailyEl = document.getElementById('daily-forecast');
    dailyEl.innerHTML = '';
    const today = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      const dayName = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
      const dn = d.getHours() >= 18 || d.getHours() < 6;
      const [, dEmoji] = wmoInfo(data.daily.weather_code[i], dn);
      const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
      const minTemp = Math.round(data.daily.temperature_2m_min[i]);
      dailyEl.innerHTML += `
        <div class="glass rounded-lg p-2 text-center text-xs">
          <div class="text-sky-400 mb-1">${i===0?'今天':`${dayName}`}</div>
          <div class="text-xl mb-1">${dEmoji}</div>
          <div class="font-semibold">${maxTemp}°</div>
          <div class="text-sky-400 text-xs">${minTemp}°</div>
        </div>`;
    }

    const condIcon = document.getElementById('weather-condition-icon');
    const condValue = document.getElementById('weather-condition-value');
    const condText = document.getElementById('weather-condition-text');
    
    if (isRaining) {
      condIcon.textContent = '🌧️';
      condValue.textContent = `${todayPrecipitation.toFixed(1)} mm`;
      condText.textContent = window.elementSdk.config.rainy_message || defaultConfig.rainy_message;
    } else {
      condIcon.textContent = '☀️';
      condValue.textContent = '0 mm';
      condText.textContent = window.elementSdk.config.sunny_message || defaultConfig.sunny_message;
    }

    document.getElementById('updated-time').textContent = `更新於 ${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}`;
    showMainScreen();
    lucide.createIcons();
  }

  function fetchWeatherData() {
    showLoadingScreen();
    setTimeout(() => {
      fetchWeather(currentLat, currentLon)
        .then(data => renderWeather(data, currentLocation))
        .catch(err => {
          console.error('無法取得天氣資料:', err);
          showMainScreen();
        });
    }, 500);
  }

  async function initWeather() {
    fetchWeatherData();
  }

  // Element SDK
  if (window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const t = document.getElementById('site-title');
        if (t) t.innerHTML = `<span style="color: #0ea5e9;">W</span><span>${config.site_title?.slice(1) || defaultConfig.site_title.slice(1)}</span>`;

        const font = config.font_family || 'Outfit';
        document.body.style.fontFamily = `${font}, 'Noto Sans TC', sans-serif`;

        if (config.ai_placeholder) {
          const aiInput = document.getElementById('ai-input');
          if (aiInput) aiInput.placeholder = config.ai_placeholder;
        }
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || 'Outfit',
          set: (v) => { config.font_family = v; if (window.elementSdk) window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['site_title', config.site_title || defaultConfig.site_title],
        ['sunny_message', config.sunny_message || defaultConfig.sunny_message],
        ['rainy_message', config.rainy_message || defaultConfig.rainy_message],
        ['ai_placeholder', config.ai_placeholder || defaultConfig.ai_placeholder]
      ])
    });
  }

  initWeather();
  lucide.createIcons();
</script>
